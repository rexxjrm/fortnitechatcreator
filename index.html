function showSuggestions(input, suggestionsContainer) {
  const value = input.value.toLowerCase().trim();
  suggestionsContainer.innerHTML = '';
  if (!value) {
    suggestionsContainer.style.display = 'none';
    return;
  }
  const filtered = characterNames.filter(name =>
    name.toLowerCase().includes(value)
  );
  if (filtered.length === 0) {
    suggestionsContainer.style.display = 'none';
    return;
  }

function handleFileUpload(side) {
  const fileInput = document.getElementById(`${side}FileInput`);
  const urlInput = document.getElementById(`${side}Image`);
  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    // If file is small enough → use directly
    if (file.size < 20 * 1024 * 1024) { // under 5MB
      urlInput.value = URL.createObjectURL(file);
      return;
    }
    // ⚠️ Large file → safely resize
    const img = new Image();
    img.src = URL.createObjectURL(file);
    img.onload = () => {
      const canvas = document.createElement('canvas');
      // Limit max dimension (SAFE for mobile)
      const MAX_SIZE = 4096;
      let { width, height } = img;
      if (width > height) {
        if (width > MAX_SIZE) {
          height *= MAX_SIZE / width;
          width = MAX_SIZE;
        }
      } else {
        if (height > MAX_SIZE) {
          width *= MAX_SIZE / height;
          height = MAX_SIZE;
        }
      }
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      urlInput.value = canvas.toDataURL('image/jpeg', 0.85); // compressed
    };
  });
}

// ==================== NEW: HELPER TO DECIDE TEXT COLOR (white or black) ====================
function getContrastColor(hexColor) {
  // Remove # if present and expand shorthand (#ABC → #AABBCC)
  let hex = hexColor.replace('#', '');
  if (hex.length === 3) {
    hex = hex.split('').map(c => c + c).join('');
  }
  const r = parseInt(hex.substring(0, 2), 16);
  const g = parseInt(hex.substring(2, 4), 16);
  const b = parseInt(hex.substring(4, 6), 16);

  // Standard luminance formula (perceived brightness)
  const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;

  // > 0.5 = light background → black text; otherwise white text
  return luminance > 0.5 ? '#000000' : '#ffffff';
}

async function getPersistentImageSrc(src) {
  // Already a permanent data URL or external URL → keep as-is
  if (!src || src.startsWith('data:') || src.startsWith('http')) {
    return src;
  }
  // blob: URL (from file upload) → convert to permanent data URL
  if (src.startsWith('blob:')) {
    try {
      const response = await fetch(src);
      const blob = await response.blob();
      // Special handling for GIFs to preserve animation
      if (blob.type === 'image/gif') {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => resolve(src);
          reader.readAsDataURL(blob);
        });
      }
      // For other images (jpg, png, etc.), use canvas (keeps them smaller)
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          resolve(canvas.toDataURL('image/jpeg', 0.85));
        };
        img.onerror = () => resolve(src);
        img.src = src;
      });
    } catch (e) {
      console.error("Failed to convert image:", e);
      return src;
    }
  }
  return src; // fallback
}

  return /iphone|ipad|ipod/i.test(navigator.userAgent);

  return ('standalone' in window.navigator) && window.navigator.standalone;
